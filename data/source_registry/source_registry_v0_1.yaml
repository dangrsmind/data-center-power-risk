version: source_registry_v0_1
sources:
  - id: virginia_scc_data_center_large_load_dockets
    name: Virginia SCC data center and large-load docket discovery
    source_type: state_regulatory_dockets
    geography: Virginia
    base_url: https://scc.virginia.gov/
    discovery_method: docket_search
    enabled: true
    priority: high
    search_terms:
      - data center
      - large load
      - electric service agreement
      - transmission interconnection
    notes: >
      Discovery seed for Virginia State Corporation Commission dockets that may
      mention data centers or large-load electric service. Docket records are
      project evidence only when the docket or filing identifies a project,
      customer, location, or facility-specific load.

  - id: generic_county_planning_data_center_search
    name: Generic county planning data center search pattern
    source_type: county_city_planning
    geography: United States counties
    base_url: https://www.google.com/search
    discovery_method: web_search_pattern
    enabled: true
    priority: high
    search_terms:
      - 'site:county.gov "data center" planning'
      - '"planning commission" "data center"'
      - '"special use permit" "data center"'
      - '"rezoning" "data center"'
    notes: >
      Pattern entry for county planning agendas, staff reports, and permit
      packets. Individual county records can be project evidence when they
      identify a data center applicant, parcel, site, or public hearing item.

  - id: generic_city_planning_data_center_search
    name: Generic city planning data center search pattern
    source_type: county_city_planning
    geography: United States cities
    base_url: https://www.google.com/search
    discovery_method: web_search_pattern
    enabled: true
    priority: medium
    search_terms:
      - 'site:city.gov "data center" planning'
      - '"city council" "data center"'
      - '"planning agenda" "data center"'
      - '"conditional use permit" "data center"'
    notes: >
      Pattern entry for city planning records. City records are project evidence
      only when they identify a specific project, applicant, location, or public
      action tied to a data center.

  - id: generic_utility_large_load_filing_search
    name: Generic utility large-load filing search pattern
    source_type: utility_large_load_filings
    geography: United States
    base_url: https://www.google.com/search
    discovery_method: web_search_pattern
    enabled: true
    priority: high
    search_terms:
      - '"large load" "data center" "utility"'
      - '"electric service agreement" "data center"'
      - '"load interconnection" "data center"'
      - '"special contract" "data center" "utility"'
    notes: >
      Pattern entry for utility filings, service agreements, tariffs, and large
      load requests. These can be project evidence when a filing identifies a
      customer, facility, location, load, or project-specific electric service
      requirement.

  - id: generic_economic_development_announcement_search
    name: Generic economic development announcement search pattern
    source_type: economic_development_announcements
    geography: United States
    base_url: https://www.google.com/search
    discovery_method: web_search_pattern
    enabled: true
    priority: medium
    search_terms:
      - '"economic development" "data center"'
      - '"data center" "jobs" "investment" "county"'
      - '"governor" "data center" "investment"'
      - '"industrial development authority" "data center"'
    notes: >
      Pattern entry for state, regional, and local economic development
      announcements. These can be project evidence when they identify a specific
      data center project, developer, site, investment, jobs announcement, or
      public incentive action.

  - id: generic_company_press_release_search
    name: Generic company press release pattern
    source_type: company_press_releases
    geography: United States
    base_url: https://www.google.com/search
    discovery_method: web_search_pattern
    enabled: true
    priority: medium
    search_terms:
      - '"data center" "press release" "MW"'
      - '"hyperscale campus" "press release"'
      - '"breaks ground" "data center"'
      - '"announces" "data center campus"'
    notes: >
      Pattern entry for developer, operator, and company announcements. Press
      releases can be project evidence when they name a project, campus, site,
      developer, phase, load, schedule, or location.

  - id: generic_developer_website_project_pages
    name: Generic developer website project page pattern
    source_type: developer_websites
    geography: United States
    base_url: https://www.google.com/search
    discovery_method: web_search_pattern
    enabled: true
    priority: medium
    search_terms:
